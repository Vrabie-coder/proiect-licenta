<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produsele noastre</title>
</head>

<body>
    <header>
        <div class="container">
            <div class="brand">
                <a href="index.html">
                    <img src="img/bee-hive.png" alt="Stupina Vrăbiuțelor Logo" class="header-logo">
                    <span class="site-title">Stupina Vrăbiuțelor</span>
                </a>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Acasă</a></li>
                    <li><a href="produse.html">Produse</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="cos.html">Coș (<span id="cart-item-count">0</span>)</a></li>
                    <li id="admin-link-container"></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <section class="products-section">
                <h2>Gama Noastră de Miere și Produse apicole</h2>
            </section>
        </div>

        <div class="container">
            <section class="products-grid" id="products-grid">
                </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Miere Naturală. Toate drepturile rezervate.</p>
        </div>
    </footer>

    <div id="custom-alert-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <p id="alert-message"></p>
            <button class="btn-primary" id="alert-ok-button">OK</button>
            <button class="btn-secondary" id="alert-cancel-button" style="display: none;">Anulează</button>
        </div>
    </div>

    <script src="js/cart.js"></script>
    <script src="js/admin.js"></script>

    <script>
        //rulează după ce cart.js si admin.js sunt încărcate
        document.addEventListener('DOMContentLoaded', () => {
            const productListElement = document.getElementById('products-grid'); 

            if (productListElement) {
                if (typeof initializeDefaultProductsIfEmpty === 'function' && typeof displayProductsOnFrontend === 'function') {
                    initializeDefaultProductsIfEmpty();
                    displayProductsOnFrontend();
                } else {
                    console.error("Una sau ambele funcții JavaScript (initializeDefaultProductsIfEmpty, displayProductsOnFrontend) nu sunt disponibile.");
                }
            } else {
                console.error("Elementul cu ID-ul 'products-grid' nu a fost găsit în DOM.");
            }
        });
    </script>
</body>

</html>
