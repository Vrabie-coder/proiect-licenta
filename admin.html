<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panou Administrare</title>
</head>

<body>
    <header>
        <div class="container">
            <div class="brand">
                <a href="index.html">
                    <img src="img/bee-hive.png" alt="Stupina Vrăbiuțelor Logo" class="header-logo">
                    <span class="site-title">Stupina Vrăbiuțelor</span>
                </a>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Acasă</a></li>
                    <li><a href="produse.html">Produse</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="cos.html">Coș (<span id="cart-item-count">0</span>)</a></li>
                    <li id="admin-link-container"></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <section class="admin-panel">
                <h2>Panou de Administrare</h2>
                <div class="admin-controls">
                    <button id="add-product-btn" class="btn-primary">Adaugă Produs Nou</button>
                    <button id="manage-orders-btn" class="btn-secondary">Gestionează Comenzi</button>
                    <button id="logout-btn" class="btn-secondary">Deconectare</button>
                </div>

                <h3>Lista Produse</h3>
                <div id="product-list-admin" class="products-grid">
                    </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Miere Naturală. Toate drepturile rezervate.</p>
        </div>
    </footer>

    <div id="product-modal" class="modal">
    <div class="modal-content">
        <span class="close-button" id="product-modal-close">&times;</span>
        <h3 id="product-modal-title">Adaugă Produs Nou</h3>
        <form id="product-form">
            <input type="hidden" id="product-id"> <div class="form-group">
                <label for="product-name">Nume Produs:</label>
                <input type="text" id="product-name" required>
            </div>
            <div class="form-group">
                <label for="product-description">Descriere:</label>
                <textarea id="product-description" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label for="product-price">Preț (RON):</label>
                <input type="number" id="product-price" step="0.01" min="0" required>
            </div>
            <div class="form-group">
                <label for="product-image">URL Imagine:</label>
                <input type="text" id="product-image">
            </div>
            <button type="submit" class="btn-primary" id="product-form-submit">Salvează Produs</button>
            <p id="product-form-error" class="error-message"></p>
        </form>
    </div>
</div>

    <div id="custom-alert-modal" class="modal">
    <div class="modal-content">
        <span class="close-button">&times;</span>
        <p id="alert-message"></p>
        <button class="btn-primary" id="alert-ok-button">OK</button>
        <button class="btn-secondary" id="alert-cancel-button" style="display: none;">Anulează</button> </div>
</div>

    <script src="js/cart.js"></script>
    <script src="js/admin.js"></script> </body>

</html>
