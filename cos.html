<body>
<header>

        <div class="brand"> <a href="index.html">
                <img src="img/bee-hive.png" alt="Stupina Vrăbiuțelor Logo" class="header-logo"> <span class="site-title">Stupina Vrăbiuțelor</span> </a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Acasă</a></li>
                <li><a href="produse.html">Produse</a></li>

                <li><a href="cos.html">Coș (<span id="cart-item-count">0</span>)</a></li>
            </ul>
        </nav>
    </div>
</header>

<main>
    <div class="container">
        <h2>Coșul Tău de Cumpărături</h2>
<div id="cart-items" class="cart-items-container">
    <p>Coșul de cumpărături este gol.</p>
</div>
<div class="cart-summary">
    <h3>Total Coș: <span id="cart-total">0.00</span> RON</h3>
    <button id="clear-cart-btn" class="btn-secondary">Golește Coșul</button>
    <button id="checkout-btn" class="btn-primary">Plasează Comanda</button>
</div>
    </div>
</main>

<footer>
    <div class="container">
        <p>&copy; 2025 Miere Naturală. Toate drepturile rezervate.</p>
    </div>
</footer>

<script src="js/cart.js"></script>

<div id="custom-alert-modal" class="modal">
    <div class="modal-content">
        <span class="close-button">&times;</span>
        <p id="alert-message"></p>
        <button class="btn-primary" id="alert-ok-button">OK</button>
    </div>
</div>
<div id="order-prompt-modal" class="modal">
    <div class="modal-content">
        <span class="close-button" id="order-prompt-close">&times;</span>
        <p>Introduceți numele dumneavoastră pentru comandă:</p>
        <input type="text" id="customer-name-input" placeholder="Nume complet" required>
        <button class="btn-primary" id="order-prompt-submit">Plasează Comanda</button>
        <button class="btn-secondary" id="order-prompt-cancel">Anulează</button>
        <p id="order-prompt-error" class="error-message"></p>
    </div>
</div>

</body>
